<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>관리자 페이지</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
      --border: #2e3352; --text: #e2e8f0; --text-muted: #8892b0;
      --primary: #5865f2; --danger: #e05252; --success: #4caf7d;
      --warn: #f0a500;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
    a { color: var(--primary); }
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .header h1 { font-size: 1.1rem; }
    .btn { padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-warn    { background: var(--warn); color: #000; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-ghost   { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 24px; background: var(--surface); }
    .tab { padding: 12px 20px; cursor: pointer; font-size: 0.9rem; border-bottom: 2px solid transparent; color: var(--text-muted); }
    .tab.active { border-bottom-color: var(--primary); color: var(--text); font-weight: 600; }
    .content { padding: 24px; max-width: 1100px; margin: 0 auto; }
    .section-title { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .report-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 20px; margin-bottom: 12px;
    }
    .report-meta { display: flex; gap: 16px; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; flex-wrap: wrap; }
    .report-meta span b { color: var(--text); }
    .report-reason { display: inline-block; background: var(--surface2); border-radius: 6px; padding: 2px 10px; font-size: 0.82rem; margin-bottom: 8px; }
    .report-content { background: var(--surface2); border-radius: 8px; padding: 8px 12px; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; word-break: break-word; }
    .report-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .report-actions .btn { font-size: 0.78rem; padding: 5px 10px; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; }
    .badge-pending { background: #f0a50033; color: var(--warn); }
    .badge-resolved { background: #4caf7d33; color: var(--success); }
    .badge-dismissed { background: var(--surface2); color: var(--text-muted); }
    .badge-answered { background: #5865f233; color: var(--primary); }
    .answer-box { background: #1e2d1e; border: 1px solid #4caf7d55; border-radius: 8px; padding: 10px 14px; margin-bottom: 10px; }
    .answer-label { font-size: 0.78rem; color: var(--success); font-weight: 600; margin-bottom: 4px; }
    .answer-text { font-size: 0.85rem; color: var(--text); white-space: pre-wrap; word-break: break-word; }
    .answer-form { margin-top: 8px; }
    .answer-textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 12px; font-size: 0.85rem; resize: vertical; min-height: 80px; font-family: inherit; }
    .answer-textarea:focus { outline: none; border-color: var(--primary); }
    .user-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 20px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .user-info { font-size: 0.9rem; }
    .user-info b { color: var(--text); }
    .user-info small { color: var(--text-muted); display: block; margin-top: 2px; font-size: 0.78rem; }
    .empty { color: var(--text-muted); text-align: center; padding: 40px 0; }
    #loading { color: var(--text-muted); text-align: center; padding: 60px 0; }
    select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 10px; font-size: 0.85rem; }
    .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; }
    .filter-bar label { font-size: 0.85rem; color: var(--text-muted); }
    .announce-form { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .announce-form h4 { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 14px; text-transform: uppercase; letter-spacing: 0.05em; }
    .form-row { margin-bottom: 12px; }
    .form-row label { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 4px; }
    .form-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 8px 12px; font-size: 0.88rem; box-sizing: border-box; font-family: inherit; }
    .form-input:focus { outline: none; border-color: var(--primary); }
    textarea.form-input { resize: vertical; min-height: 100px; }
    .announce-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; margin-bottom: 12px; }
    .announce-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
    .announce-card-title { font-weight: 600; font-size: 0.95rem; }
    .announce-card-meta { font-size: 0.78rem; color: var(--text-muted); }
    .announce-card-body { font-size: 0.85rem; color: var(--text-muted); white-space: pre-wrap; word-break: break-word; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
    .activity-search-bar { display:flex; gap:10px; margin-bottom:20px; }
    .activity-search-bar input { flex:1; max-width:320px; }
    .activity-section { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; margin-bottom:16px; }
    .activity-section-title { font-size:0.88rem; font-weight:700; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:12px; display:flex; align-items:center; gap:8px; }
    .activity-count { background:var(--surface2); color:var(--text-muted); font-size:0.75rem; padding:2px 8px; border-radius:10px; font-weight:600; text-transform:none; }
    .activity-info-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; }
    .activity-info-item { background:var(--surface2); border-radius:8px; padding:10px 14px; }
    .activity-info-label { display:block; font-size:0.75rem; color:var(--text-muted); margin-bottom:3px; }
    .activity-empty { color:var(--text-muted); font-size:0.85rem; padding:8px 0; }
    .activity-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
    .activity-table th { text-align:left; color:var(--text-muted); font-weight:600; padding:6px 10px; border-bottom:1px solid var(--border); white-space:nowrap; }
    .activity-table td { padding:7px 10px; border-bottom:1px solid var(--border); word-break:break-word; }
    .activity-table tr:last-child td { border-bottom:none; }
    .activity-table tr:hover td { background:var(--surface2); }
    .activity-user-pick { cursor:pointer; }
    .activity-user-pick:hover { background:var(--surface2); }
    .user-card.revoked { opacity: 0.5; }
    .user-card.revoked .user-info b { text-decoration: line-through; }
    .badge-revoked { background: var(--surface2); color: var(--text-muted); display:inline-block; padding:2px 8px; border-radius:12px; font-size:0.72rem; font-weight:700; margin-left:6px; }
    .confirm-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; align-items:center; justify-content:center; z-index:999; }
    .confirm-box { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:28px; max-width:340px; width:100%; text-align:center; }
    .confirm-box p { font-size:0.95rem; margin-bottom:20px; line-height:1.6; }
    .confirm-box .actions { display:flex; gap:10px; justify-content:center; }
  </style>
</head>
<body>

<div class="header">
  <h1>🛡️ 관리자 페이지</h1>
  <div style="display:flex;gap:8px;align-items:center;">
    <span id="admin-name" style="font-size:0.85rem;color:var(--text-muted);"></span>
    <button class="btn btn-ghost" id="logout-btn">로그아웃</button>
    <a href="/" style="text-decoration:none;"><button class="btn btn-ghost">← 메인</button></a>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="reports">📋 신고 목록</div>
  <div class="tab" data-tab="users">👥 유저 관리</div>
  <div class="tab" data-tab="inquiries">📩 문의 목록</div>
  <div class="tab" data-tab="announcements">📢 공지사항</div>
  <div class="tab" data-tab="faq">❓ FAQ</div>
  <div class="tab" data-tab="activity">👤 활동 로그</div>
  <div class="tab" data-tab="guild-log">🏰 길드 로그</div>
  <div class="tab" data-tab="user-list">📋 전체 유저</div>
  <div class="tab" data-tab="terms">📜 이용약관</div>
</div>

<div class="content">
  <div id="loading">로딩 중...</div>

  <!-- 신고 목록 탭 -->
  <div id="tab-reports" class="tab-content" style="display:none;">
    <div class="filter-bar">
      <label>상태 필터:</label>
      <select id="status-filter">
        <option value="pending">대기 중</option>
        <option value="all">전체</option>
        <option value="resolved">처리됨</option>
        <option value="dismissed">기각됨</option>
      </select>
    </div>
    <div id="reports-list"></div>
  </div>

  <!-- 유저 관리 탭 -->
  <div id="tab-users" class="tab-content" style="display:none;">
    <div class="filter-bar">
      <label>표시 필터:</label>
      <select id="users-filter">
        <option value="active">활성 처벌만</option>
        <option value="all">전체</option>
      </select>
    </div>
    <div id="users-list"></div>

    <div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--border);">
      <div class="section-title" style="margin-bottom:16px;">📧 이메일 블랙리스트</div>
      <div id="banned-emails-list"></div>
    </div>
  </div>

  <!-- 처벌 해지 확인 모달 -->
  <div id="revoke-modal" class="confirm-overlay" style="display:none;">
    <div class="confirm-box">
      <p id="revoke-modal-msg">정말로 처벌을 해지하시겠습니까?</p>
      <div class="actions">
        <button id="revoke-confirm-btn" class="btn btn-success">확인</button>
        <button id="revoke-cancel-btn" class="btn btn-ghost">취소</button>
      </div>
    </div>
  </div>

  <!-- 처벌 변경 모달 -->
  <div id="change-punish-modal" class="confirm-overlay" style="display:none;">
    <div class="confirm-box" style="max-width:400px;">
      <h4 style="margin-bottom:6px;font-size:0.95rem;">처벌 변경</h4>
      <p id="change-punish-target" style="font-size:0.85rem;color:var(--text-muted);margin-bottom:16px;"></p>
      <div style="margin-bottom:12px;text-align:left;">
        <label style="display:block;font-size:0.82rem;color:var(--text-muted);margin-bottom:6px;">새 처벌 종류</label>
        <select id="change-punish-select" style="width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:0.88rem;">
          <option value="warning">⚠️ 경고</option>
          <option value="chat_ban">💬 채팅금지</option>
          <option value="suspend">🔒 이용정지</option>
          <option value="permanent_ban">🚫 영구정지</option>
        </select>
      </div>
      <div id="change-punish-days-wrap" style="display:none;margin-bottom:12px;text-align:left;align-items:center;gap:8px;">
        <input type="number" id="change-punish-days" min="1" max="3650" placeholder="기간" style="width:100px;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:8px 10px;font-size:0.88rem;" />
        <span style="font-size:0.88rem;color:var(--text-muted);">일</span>
      </div>
      <div class="actions">
        <button id="change-punish-confirm-btn" class="btn btn-warn">변경 적용</button>
        <button id="change-punish-cancel-btn" class="btn btn-ghost">취소</button>
      </div>
    </div>
  </div>

  <!-- 문의 목록 탭 -->
  <div id="tab-inquiries" class="tab-content" style="display:none;">
    <div class="filter-bar">
      <label>상태 필터:</label>
      <select id="inquiry-status-filter">
        <option value="pending">대기 중</option>
        <option value="all">전체</option>
        <option value="answered">답변완료</option>
        <option value="resolved">처리됨</option>
      </select>
    </div>
    <div id="inquiries-list"></div>
  </div>

  <!-- 공지사항 탭 -->
  <div id="tab-announcements" class="tab-content" style="display:none;">
    <div class="announce-form">
      <h4 id="announce-form-title">새 공지 작성</h4>
      <input type="hidden" id="announce-edit-id" value="" />
      <div class="form-row">
        <label>제목</label>
        <input type="text" id="announce-title-input" class="form-input" placeholder="공지 제목" />
      </div>
      <div class="form-row">
        <label>내용</label>
        <textarea id="announce-content-input" class="form-input" placeholder="공지 내용"></textarea>
      </div>
      <div class="form-row" style="display:flex;align-items:center;gap:8px;">
        <input type="checkbox" id="announce-pinned-input" />
        <label style="margin:0;cursor:pointer;" for="announce-pinned-input">📌 상단 고정</label>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn btn-primary" id="announce-save-btn">저장</button>
        <button class="btn btn-ghost" id="announce-cancel-btn" style="display:none;">취소</button>
      </div>
    </div>
    <div class="section-title">공지 목록</div>
    <div id="announcements-list"></div>
  </div>

  <!-- FAQ 탭 -->
  <div id="tab-faq" class="tab-content" style="display:none;">
    <div class="announce-form">
      <h4 id="faq-form-title">새 FAQ 추가</h4>
      <input type="hidden" id="faq-edit-id" value="" />
      <div class="form-group">
        <label>질문</label>
        <input type="text" id="faq-question-input" class="form-input" placeholder="자주 묻는 질문" />
      </div>
      <div class="form-group">
        <label>답변</label>
        <textarea id="faq-answer-input" class="form-input" rows="4" placeholder="답변 내용"></textarea>
      </div>
      <div class="form-group">
        <label>정렬 순서 (숫자 낮을수록 위)</label>
        <input type="number" id="faq-order-input" class="form-input" value="0" style="width:100px;" />
      </div>
      <div style="display:flex;gap:8px;margin-top:4px;">
        <button class="btn btn-primary" id="faq-save-btn">저장</button>
        <button class="btn btn-ghost" id="faq-cancel-btn" style="display:none;">취소</button>
      </div>
    </div>
    <div class="section-title">FAQ 목록</div>
    <div id="faq-admin-list"></div>
  </div>

  <!-- 활동 로그 탭 -->
  <div id="tab-activity" class="tab-content" style="display:none;">
    <div class="activity-search-bar">
      <input type="text" id="activity-search-input" class="form-input" placeholder="닉네임으로 검색..." />
      <button class="btn btn-primary" id="activity-search-btn">검색</button>
    </div>
    <div id="activity-result"></div>
  </div>

  <!-- 길드 로그 탭 -->
  <div id="tab-guild-log" class="tab-content" style="display:none;">
    <div class="activity-search-bar">
      <input type="text" id="guild-log-search-input" class="form-input" placeholder="길드 이름으로 검색..." />
      <button class="btn btn-primary" id="guild-log-search-btn">검색</button>
    </div>
    <div id="guild-log-result"></div>
  </div>

  <!-- 이용약관 탭 -->
  <div id="tab-terms" class="tab-content" style="display:none;">
    <div class="announce-form">
      <h4>이용약관 내용 편집</h4>
      <div class="form-row">
        <label>약관 내용</label>
        <textarea id="terms-content-input" class="form-input" style="min-height:480px;font-family:monospace;font-size:0.85rem;" placeholder="이용약관 내용을 입력하세요..."></textarea>
      </div>
      <div style="display:flex;gap:8px;margin-top:14px;align-items:center;">
        <button class="btn btn-primary" id="terms-save-btn">저장</button>
        <span id="terms-save-status" style="font-size:0.82rem;color:var(--text-muted);"></span>
      </div>
    </div>
    <div id="terms-preview-wrap" class="activity-section" style="display:none;">
      <div class="activity-section-title">미리보기</div>
      <div id="terms-preview-body" style="font-size:0.875rem;line-height:1.9;white-space:pre-wrap;word-break:break-word;color:var(--text-muted);"></div>
    </div>
  </div>

  <!-- 전체 유저 목록 탭 -->
  <div id="tab-user-list" class="tab-content" style="display:none;">
    <div class="filter-bar">
      <input type="text" id="user-list-search" class="form-input" placeholder="닉네임으로 검색..." style="max-width:240px;" />
      <button class="btn btn-primary" id="user-list-search-btn">검색</button>
      <label style="margin-left:8px;">정렬:</label>
      <select id="user-list-sort">
        <option value="created_at">가입일순</option>
        <option value="last_seen">마지막 접속일순</option>
        <option value="nickname">닉네임순</option>
      </select>
    </div>
    <div id="user-list-count" style="font-size:0.85rem;color:var(--text-muted);margin-bottom:12px;"></div>
    <div id="user-list-table"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="admin.js"></script>
</body>
</html>
