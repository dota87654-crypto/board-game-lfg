<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>보드게임 LFG - 같이 보드게임해요!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
<div id="app">

  <!-- Loading -->
  <div id="view-loading" class="view loading-view">
    <div class="spinner"></div>
  </div>

  <!-- Auth -->
  <div id="view-auth" class="view" hidden>
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-logo">🎲</div>
        <h1 class="auth-title">보드게임 LFG</h1>
        <p class="auth-sub">같이 보드게임할 사람을 찾아보세요</p>
        <div class="auth-cats">
          <span>🏠 보드게임방</span>
          <span>☕ 개인소유</span>
          <span>🖥️ 테이블탑 시뮬레이터</span>
          <span>🌐 BGA</span>
          <span>🎮 스팀게임</span>
        </div>
        <button class="btn-google" id="btn-google-login">
          <svg width="20" height="20" viewBox="0 0 24 24">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google로 로그인
        </button>
      </div>
    </div>
  </div>

  <!-- Main -->
  <div id="view-main" class="view" hidden>
    <header class="header">
      <div class="header-l">
        <span class="logo">🎲 보드게임 LFG</span>
      </div>
      <div class="header-r">
        <button class="btn btn-primary" id="btn-create-room">+ 방 만들기</button>
        <div class="user-info">
          <img class="u-avatar" id="user-avatar" src="" alt="">
          <span class="u-name" id="user-name"></span>
          <button class="btn btn-ghost" id="btn-logout">로그아웃</button>
        </div>
      </div>
    </header>
    <nav class="cat-nav">
      <button class="cat-tab active" data-cat="all">🎲 전체</button>
      <button class="cat-tab" data-cat="boardgame_cafe">🏠 보드게임방</button>
      <button class="cat-tab" data-cat="private">☕ 개인소유</button>
      <button class="cat-tab" data-cat="tabletop_sim">🖥️ 테이블탑 시뮬레이터</button>
      <button class="cat-tab" data-cat="bga">🌐 BGA</button>
      <button class="cat-tab" data-cat="steam">🎮 스팀게임</button>
    </nav>
    <main class="content">
      <div class="rooms-bar">
        <h2 class="rooms-title">모집 중인 방</h2>
        <span class="rooms-badge" id="rooms-count">0개</span>
      </div>
      <div class="room-grid" id="room-grid"></div>
    </main>
  </div>

  <!-- Room -->
  <div id="view-room" class="view" hidden>
    <header class="header">
      <div class="header-l">
        <button class="btn btn-ghost" id="btn-back">← 목록으로</button>
        <span class="logo">🎲 보드게임 LFG</span>
      </div>
      <div class="header-r">
        <div class="user-info">
          <img class="u-avatar" id="room-user-avatar" src="" alt="">
          <span class="u-name" id="room-user-name"></span>
        </div>
      </div>
    </header>
    <div class="room-layout">
      <aside class="room-side">
        <div class="info-card">
          <div id="room-cat-badge"></div>
          <h2 id="room-title" class="r-title"></h2>
          <p id="room-game" class="r-game"></p>
          <p id="room-desc" class="r-desc"></p>
          <div class="r-meta">
            <div class="r-meta-row"><span class="meta-k">호스트</span><span class="meta-v" id="room-host"></span></div>
            <div class="r-meta-row"><span class="meta-k">인원</span><span class="meta-v"><span id="room-cur">0</span> / <span id="room-max">0</span></span></div>
          </div>
          <button class="btn btn-primary btn-block" id="btn-join-leave">방 참여하기</button>
        </div>
        <div class="members-card">
          <h3 class="members-heading">참여자 <span id="member-count">0</span>명</h3>
          <div class="members-list" id="members-list"></div>
        </div>
      </aside>
      <section class="chat-panel">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-bar">
          <input class="chat-input" id="chat-input" type="text" placeholder="메시지를 입력하세요 (Enter 전송)" maxlength="500">
          <button class="btn btn-primary" id="btn-send">전송</button>
        </div>
      </section>
    </div>
  </div>

</div>

<!-- Create Room Modal -->
<div class="modal-overlay" id="modal-create" hidden>
  <div class="modal">
    <div class="modal-head">
      <h3>방 만들기</h3>
      <button class="modal-x" id="btn-modal-close">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="label">방 제목 *</label>
        <input class="input" id="f-title" type="text" placeholder="ex) 카탄 같이해요!" maxlength="50">
      </div>
      <div class="field">
        <label class="label">게임 이름</label>
        <input class="input" id="f-game" type="text" placeholder="ex) 카탄, 아컴호러" maxlength="50">
      </div>
      <div class="field">
        <label class="label">카테고리 *</label>
        <select class="input" id="f-category">
          <option value="boardgame_cafe">🏠 보드게임방</option>
          <option value="private">☕ 개인소유 (카페, 집 등)</option>
          <option value="tabletop_sim">🖥️ 테이블탑 시뮬레이터</option>
          <option value="bga">🌐 Board Game Arena</option>
          <option value="steam">🎮 스팀게임</option>
        </select>
      </div>
      <div class="field">
        <label class="label">최대 인원 *</label>
        <input class="input" id="f-max" type="number" min="2" max="20" value="4">
      </div>
      <div class="field">
        <label class="label">설명</label>
        <textarea class="input textarea" id="f-desc" placeholder="게임 방법, 경험 수준, 시간 등을 적어주세요." maxlength="300"></textarea>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" id="btn-cancel">취소</button>
      <button class="btn btn-primary" id="btn-submit">방 만들기</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="main.js?v=3"></script>
</body>
</html>
